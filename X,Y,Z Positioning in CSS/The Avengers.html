<!DOCTYPE html>

<html>

<head>

    <style>
        div {

            position: relative;

            width: 100px;

            padding: 20px;

            background-color: #5ce7ff;

            color: rgb(0, 0, 0);

            border: 5px rgb(255, 0, 0) solid
        }

        .div1 {

            z-index: 1;

        }

        .div2 {

            z-index: 2;

            top: -25px;

            left: 75px;

        }

        .div3 {

            z-index: 3;

            top: -50px;

        }

        .div4 {

            z-index: 4;

            top: -75px;

            left: 50px;

        }
        .div5 {

            z-index: 5;
            top: -100px;
            
        }
        .div6 {

            z-index: 6;
            top: -125px;
            left: 50px;
        }
    </style>

</head>

<body>

    <div class="div1">Iron man</div>

    <div class="div2">Captain America</div>

    <div class="div3">Hulk</div>

    <div class="div4">Thor</div>

    <div class="div5">Hawkeye</div>

    <div class="div6">Black Widow</div>

</body>

</html>
